<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J</title>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <script src="/js/boot.js"></script>

    <link rel="stylesheet" href="/css/main.css">

    <script type="module" src="/js/main.js"></script>
</head>

<body>
    <header class="top">
        <div class="top-inner">
            <a class="logo" href="/">
                <img class="logo-icon" src="/favicon.svg" alt="" draggable="false">
            </a>

            <div class="top-actions">
                <button class="theme-button icon-button" type="button">
                    <span class="icon icon-moon theme-dark"></span>
                    <span class="icon icon-sun theme-light"></span>
                </button>

                <button
                    class="notify-button icon-button"
                    type="button"
                    aria-expanded="false"
                    aria-controls="notify-panel"
                >
                    <span class="icon icon-bell"></span>
                    <span class="notify-badge" hidden>0</span>
                </button>
            </div>
        </div>
    </header>

    <aside class="notify-panel" id="notify-panel" hidden>
        <div class="notify-head">
            <div class="notify-head-title">
                <span class="icon icon-bell"></span>
                <strong>알림</strong>
            </div>

            <div class="notify-actions">
                <button class="notify-clear" type="button">
                    모두 읽음
                </button>

                <button class="notify-remove-all" type="button">
                    모두 지우기
                </button>
            </div>
        </div>

        <div class="notify-tabs">
            <button class="notify-tab is-active" type="button" data-filter="all">
                전체
            </button>

            <button class="notify-tab" type="button" data-filter="unread">
                미확인
            </button>

            <button class="notify-search-button" type="button">
                <span class="icon icon-search"></span>
            </button>
        </div>

        <div class="notify-search" hidden>
            <input
                class="notify-search-input"
                type="search"
                placeholder="검색"
            >

            <button class="notify-search-close" type="button">
                닫기
            </button>
        </div>

        <div class="notify-list-wrap">
            <div class="notify-list">
                <p class="notify-empty">
                    새로운 알림이 없습니다.
                </p>
            </div>
        </div>
    </aside>

    <main class="middle">
        <section class="hero">
            <h1>Hello World</h1>
        </section>
    </main>

    <footer class="bottom">
    </footer>
</body>
</html>
