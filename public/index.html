<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="제목">
    <meta property="og:description" content="내용">
    <meta property="og:url" content="https://https://182.226.250.69/">
    <meta property="og:image" content="https://https://182.226.250.69/assets/embed.png">
    <meta property="og:type" content="website">

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <script src="/js/boot.js"></script>

    <link rel="stylesheet" href="/css/main.css">

    <script type="module" src="/js/main.js"></script>
</head>

<body>
    <header class="top">
        <div class="top-wrap">
            <a class="logo" href="/">
                <img class="logo-icon" src="/favicon.svg" draggable="false">
            </a>

            <div class="tools">
                <div class="theme">
                    <button class="tool" type="button">
                        <span class="icon icon-light theme-light"></span>
                        <span class="icon icon-dark theme-dark"></span>
                    </button>

                    <div class="theme-box" hidden>
                        <div class="theme-head">
                            <button class="theme-close" type="button" data-theme-close>
                                <span class="icon icon-close"></span>
                            </button>

                            <strong>테마</strong>
                        </div>

                        <button class="theme-item" type="button" data-theme-value="system">
                            <span class="icon icon-setting"></span>
                            <span>시스템 테마</span>
                        </button>

                        <button class="theme-item" type="button" data-theme-value="light">
                            <span class="icon icon-light"></span>
                            <span>밝은 테마</span>
                        </button>

                        <button class="theme-item" type="button" data-theme-value="dark">
                            <span class="icon icon-dark"></span>
                            <span>어두운 테마</span>
                        </button>
                    </div>
                </div>

                <div class="notify">
                    <button class="tool" type="button">
                        <span class="icon icon-bell"></span>
                        <span class="notify-badge" hidden>0</span>
                    </button>

                    <aside class="notify-box" id="notify" hidden>
                        <div class="notify-head">
                            <button class="notify-close" type="button">
                                <span class="icon icon-close"></span>
                            </button>

                            <div class="notify-head-title">
                                <strong>알림</strong>
                            </div>

                            <div class="notify-actions">
                                <button class="notify-clear" type="button">
                                    모두 읽음
                                </button>

                                <button class="notify-remove-all" type="button">
                                    모두 지우기
                                </button>
                            </div>
                        </div>

                        <div class="notify-tabs">
                            <button class="notify-tab active" type="button" data-filter="all">
                                전체
                            </button>

                            <button class="notify-tab" type="button" data-filter="unread">
                                미확인
                            </button>

                            <button class="notify-search-button" type="button">
                                <span class="icon icon-search"></span>
                            </button>
                        </div>

                        <div class="notify-search" hidden>
                            <input
                                class="notify-search-input"
                                type="search"
                                placeholder="검색"
                            >

                            <button class="notify-search-close" type="button">
                                닫기
                            </button>
                        </div>

                        <div class="notify-list">
                            <p class="notify-empty">
                                새로운 알림이 없습니다.
                            </p>
                        </div>
                    </aside>
                </div>

                <div class="settings">
                    <button class="tool" type="button">
                        <span class="icon icon-setting"></span>
                    </button>

                    <div class="settings-layer" hidden>
                        <section class="settings-box" tabindex="-1">
                            <aside class="settings-side">
                                <div class="settings-side-header">
                                    <button class="settings-close" type="button" data-settings-close>
                                        <span class="icon icon-close"></span>
                                    </button>

                                    <div class="settings-side-title">
                                        <strong>설정</strong>
                                    </div>
                                </div>

                                <div class="settings-menu">
                                    <button class="settings-tab" type="button" data-settings-type="general">
                                        <span class="icon icon-setting"></span>
                                        <span>일반</span>
                                    </button>

                                    <button class="settings-tab" type="button" data-settings-type="notification">
                                        <span class="icon icon-bell"></span>
                                        <span>알림</span>
                                    </button>
                                </div>
                            </aside>

                            <div class="settings-page">
                                <div class="settings-page-header">
                                    <button class="settings-back" type="button" data-settings-mobile-back>
                                        <span class="icon icon-back"></span>
                                    </button>

                                    <div class="settings-title">
                                        <strong data-settings-title>설정</strong>
                                    </div>
                                </div>

                                <div class="settings-body">
                                    <div class="settings-content" data-settings-content>
                                        <div class="settings-loading">
                                            <img
                                                class="settings-throbber"
                                                src="/assets/icons/throbber.svg"
                                                draggable="false"
                                            >
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="middle">
        <section class="hero">
            <h1>Hello World</h1>
        </section>
    </main>

    <footer class="bottom">
    </footer>
</body>
</html>
