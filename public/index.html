<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jjing</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="topbar">
        <div class="inner">
            <a class="logo" href="/">
                <span class="logo-icon"></span>
            </a>

            <div class="topbar-actions">
                <button class="theme-button icon-button" type="button">
                    <span class="icon icon-moon"></span>
                    <span class="icon icon-sun"></span>
                </button>

                <div class="notification">
                    <button class="notification-button icon-button" type="button">
                        <span class="icon icon-bell"></span>
                        <span class="notification-badge" data-notification-count>0</span>
                    </button>

                    <div class="notification-box">
                        <div class="notification-header">
                            <div class="notification-title">
                                <span class="icon icon-bell"></span>
                                <strong>알림</strong>
                            </div>

                            <button class="notification-setting settings-button" type="button" data-settings-open="notification">
                                <span class="icon icon-setting"></span>
                            </button>
                        </div>

                        <div class="notification-menu">
                            <div class="notification-tabs">
                                <button class="notification-tab is-active" type="button" data-notification-filter="all">
                                    전체
                                </button>
                                <button class="notification-tab" type="button" data-notification-filter="unread">
                                    미확인
                                </button>
                            </div>

                            <div class="notification-actions">
                                <button class="notification-action" type="button" data-notification-read-all>
                                    모두 읽음
                                </button>
                                <button class="notification-action" type="button" data-notification-clear-all>
                                    모두 지우기
                                </button>
                            </div>
                        </div>

                        
                        <div class="notification-list">
                            <p class="notification-empty">받은 알림이 없습니다.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <main class="page">
        <section class="hero">
            <h1>Hello World</h1>
        </section>
    </main>

    <script src="/scripts.js"></script>
</body>
</html>
