<div class="settings-layer">
    <div class="settings-backdrop" data-settings-close></div>

    <section class="settings-popup" role="dialog" aria-modal="true" aria-label="설정">
        <div class="settings-header">
            <strong>설정</strong>

            <button class="settings-close" type="button" data-settings-close>
                닫기
            </button>
        </div>

        <div class="settings-tabs">
            <button class="settings-tab is-active" type="button" data-settings-tab="general">
                일반
            </button>

            <button class="settings-tab" type="button" data-settings-tab="notification">
                알림
            </button>
        </div>

        <div class="settings-body">
            <div class="settings-panel is-active" data-settings-panel="general">
            </div>

            <div class="settings-panel" data-settings-panel="notification">
            </div>
        </div>
    </section>
</div>
