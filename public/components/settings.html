<div class="settings-layer">
    <div class="settings-backdrop" data-settings-close></div>

    <section class="settings-popup" role="dialog" aria-modal="true" aria-label="설정">
        <div class="settings-header">
            <strong>설정</strong>

            <button class="settings-close" type="button" data-settings-close>
                닫기
            </button>
        </div>

        <div class="settings-tabs">
            <button class="settings-tab" type="button" data-settings-type="general">
                일반
            </button>

            <button class="settings-tab" type="button" data-settings-type="notification">
                알림
            </button>
        </div>

        <div class="settings-body">
            <div class="settings-content" data-settings-content>
                <div class="settings-loading">
                    <span class="settings-spinner icon icon-setting"></span>
                </div>
            </div>
        </div>
    </section>
</div>
