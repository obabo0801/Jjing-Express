<div class="settings-layer">
    <section class="settings-box" tabindex="-1">
        <aside class="settings-side">
            <div class="settings-side-header">
                <button class="settings-close" type="button" data-settings-close>
                    <span class="icon icon-back"></span>
                </button>

                <div class="settings-side-title">
                    <strong>설정</strong>
                </div>
            </div>

            <div class="settings-menu">
                <button class="settings-tab" type="button" data-settings-type="general">
                    <span class="icon icon-setting"></span>
                    <span>일반</span>
                </button>

                <button class="settings-tab" type="button" data-settings-type="notification">
                    <span class="icon icon-bell"></span>
                    <span>알림</span>
                </button>
            </div>
        </aside>

        <div class="settings-page">
            <div class="settings-page-header">
                <button class="settings-back" type="button" data-settings-mobile-back>
                    <span class="icon icon-back"></span>
                </button>

                <div class="settings-title">
                    <strong data-settings-title>설정</strong>
                </div>
            </div>

            <div class="settings-body">
                <div class="settings-content" data-settings-content>
                    <div class="settings-loading">
                        <span class="settings-spinner icon icon-setting"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
