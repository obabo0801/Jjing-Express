<div class="settings-section">
    <div class="settings-item">
        <div class="settings-item-info">
            <strong>알림 받기</strong>
            <span>새 알림 표시 여부를 설정합니다.</span>
        </div>

        <button
            class="settings-toggle"
            type="button"
            data-notify-toggle="enable"
        >
            켜짐
        </button>
    </div>

    <div class="settings-item">
        <div class="settings-item-info">
            <strong>알림 소리</strong>
            <span>새 알림이 올 때 소리 사용 여부를 설정합니다.</span>
        </div>

        <button
            class="settings-toggle"
            type="button"
            data-notify-toggle="sound"
        >
            켜짐
        </button>
    </div>
</div>
