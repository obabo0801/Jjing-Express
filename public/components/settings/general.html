<div class="settings-section">
    <div class="settings-item">
        <div class="settings-item-info">
            <strong>화면 크기</strong>
            <span>화면 전체 크기를 조절합니다.</span>
        </div>

        <div class="settings-size-dropdown" data-screen-scale-dropdown>
            <button class="settings-size-trigger" type="button" data-screen-scale-trigger>
                <span data-screen-scale-text>100%</span>
                <span class="settings-size-arrow"></span>
            </button>

            <div class="settings-size-menu">
                <button type="button" data-screen-scale="0.9">90%</button>
                <button type="button" data-screen-scale="1">100%</button>
                <button type="button" data-screen-scale="1.1">110%</button>
                <button type="button" data-screen-scale="1.2">120%</button>
                <button type="button" data-screen-scale="1.3">130%</button>
                <button type="button" data-screen-scale="1.4">140%</button>
                <button type="button" data-screen-scale="1.5">150%</button>
            </div>
        </div>
    </div>

    <div class="settings-item">
        <div class="settings-item-info">
            <strong>글자 크기</strong>
            <span>전체 글자 크기를 조절합니다.</span>
        </div>

        <div class="settings-size-dropdown" data-font-scale-dropdown>
            <button class="settings-size-trigger" type="button" data-font-scale-trigger>
                <span data-font-scale-text>100%</span>
                <span class="settings-size-arrow"></span>
            </button>

            <div class="settings-size-menu">
                <button type="button" data-font-scale="0.9">90%</button>
                <button type="button" data-font-scale="1">100%</button>
                <button type="button" data-font-scale="1.1">110%</button>
                <button type="button" data-font-scale="1.2">120%</button>
                <button type="button" data-font-scale="1.3">130%</button>
            </div>
        </div>
    </div>
</div>
